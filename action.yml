name: 'CMake Dependency Checker'
description: 'Scan CMake FetchContent dependencies for available updates with optional PRs.'
author: 'dmnq-f'

branding:
  icon: 'refresh-cw'
  color: 'blue'

inputs:
  path:
    description: 'Path to CMakeLists.txt or project root directory'
    required: false
    default: 'CMakeLists.txt'
  scan-only:
    description: 'List dependencies without checking for updates'
    required: false
    default: 'false'
  exclude:
    description: 'Directory exclusion patterns, one per line'
    required: false
    default: ''
  ignore:
    description: 'Dependency names to exclude from results, one per line'
    required: false
    default: ''
  update-types:
    description: 'Only include these update types in results and PRs (comma-separated: major, minor, patch, unknown). If unset, all types are included.'
    required: false
    default: ''
  fail-on-updates:
    description: 'Fail the workflow if any dependency has an available update'
    required: false
    default: 'false'
  create-prs:
    description: 'Create pull requests for available updates'
    required: false
    default: 'false'
  dry-run:
    description: 'Log what PRs would be created without actually creating them (requires create-prs: true)'
    required: false
    default: 'false'
  token:
    description: 'GitHub token for creating PRs. Use a GitHub App token or PAT if PR checks must trigger.'
    required: false
    default: '${{ github.token }}'

outputs:
  has-updates:
    description: 'Whether any dependency has an available update (true/false)'
  total:
    description: 'Total number of dependencies found'
  updates-available:
    description: 'Number of dependencies with available updates'
  result-json:
    description: 'Full scan result as JSON string'
  prs-created:
    description: 'Number of pull requests created'

runs:
  using: 'node24'
  main: 'dist/action/index.js'
